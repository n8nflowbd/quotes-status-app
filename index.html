<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quotes & Status">
<title>✨ Quotes & Status</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans:wght@400;600&family=Noto+Sans+Bengali&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a;
    --card: #12122a;
    --accent: #ff4d6d;
    --accent2: #4d79ff;
    --gold: #ffd700;
    --text: #ffffff;
    --muted: #888aaa;
    --border: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(255,77,109,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(77,121,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 20px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,26,0.9);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .fav-btn-header {
    background: none;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .fav-btn-header:active { transform: scale(0.95); background: rgba(255,77,109,0.1); }

  /* Filters */
  .filters {
    padding: 14px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Sans', sans-serif;
  }
  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
  }
  .filter-chip:active { transform: scale(0.95); }

  /* Language Filter */
  .lang-filters {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .lang-filters::-webkit-scrollbar { display: none; }

  .lang-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.3s;
  }
  .lang-chip.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
  }

  /* Main Quote Card */
  .quote-section {
    flex: 1;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .quote-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px 24px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .quote-card::before {
    content: '"';
    position: absolute;
    top: -10px;
    left: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 120px;
    color: rgba(255,77,109,0.08);
    line-height: 1;
  }

  .quote-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
    border-radius: 24px 24px 0 0;
  }

  .quote-text {
    font-size: 20px;
    line-height: 1.7;
    font-weight: 400;
    color: var(--text);
    text-align: center;
    position: relative;
    z-index: 1;
    font-family: 'Playfair Display', serif;
  }

  .quote-text.urdu {
    font-family: 'Noto Nastaliq Urdu', serif;
    direction: rtl;
    font-size: 18px;
  }

  .quote-text.bengali {
    font-family: 'Noto Sans Bengali', sans-serif;
  }

  .quote-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
  }

  .quote-category {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .quote-counter {
    font-size: 12px;
    color: var(--muted);
  }

  /* Action Buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn {
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:active { transform: scale(0.96); }

  .btn-next {
    background: linear-gradient(135deg, var(--accent), #c9184a);
    color: white;
    grid-column: 1 / -1;
  }

  .btn-share {
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
  }

  .btn-fav {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent);
  }
  .btn-fav.saved {
    background: rgba(255,77,109,0.1);
    border-color: var(--accent);
  }

  .btn-copy {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent2);
    grid-column: 1 / -1;
  }

  /* Category Colors */
  .cat-motivational { background: rgba(255,165,0,0.15); color: #ffa500; }
  .cat-love { background: rgba(255,77,109,0.15); color: #ff4d6d; }
  .cat-sad { background: rgba(77,121,255,0.15); color: #4d79ff; }
  .cat-islamic { background: rgba(0,200,150,0.15); color: #00c896; }
  .cat-funny { background: rgba(255,220,0,0.15); color: #ffdc00; }
  .cat-festival { background: rgba(200,100,255,0.15); color: #c864ff; }

  /* Favourites Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
  }

  .fav-item {
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 15px;
    line-height: 1.6;
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .fav-delete {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .no-favs {
    text-align: center;
    color: var(--muted);
    padding: 30px;
    font-size: 15px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1e1e3a;
    border: 1px solid var(--border);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  /* Install Banner */
  .install-banner {
    margin: 0 16px 16px;
    background: linear-gradient(135deg, rgba(77,121,255,0.2), rgba(255,77,109,0.2));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .install-text { font-size: 13px; color: var(--text); }
  .install-text span { color: var(--accent2); font-weight: 600; }

  .install-btn {
    background: var(--accent2);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .install-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">✨ Quotes & Status</div>
    <button class="fav-btn-header" onclick="openFavs()">❤️ Saved</button>
  </header>

  <!-- Category Filter -->
  <div class="filters" id="categoryFilters">
    <button class="filter-chip active" onclick="setCategory('All', this)">🌟 All</button>
    <button class="filter-chip" onclick="setCategory('Motivational', this)">💪 Motivational</button>
    <button class="filter-chip" onclick="setCategory('Love', this)">❤️ Love</button>
    <button class="filter-chip" onclick="setCategory('Sad', this)">💔 Sad</button>
    <button class="filter-chip" onclick="setCategory('Islamic', this)">🕌 Islamic</button>
    <button class="filter-chip" onclick="setCategory('Funny', this)">😄 Funny</button>
    <button class="filter-chip" onclick="setCategory('Festival', this)">🎉 Festival</button>
  </div>

  <!-- Language Filter -->
  <div class="lang-filters" id="langFilters">
    <button class="lang-chip active" onclick="setLanguage('All', this)">🌐 All</button>
    <button class="lang-chip" onclick="setLanguage('Hindi', this)">🇮🇳 Hindi</button>
    <button class="lang-chip" onclick="setLanguage('Bengali', this)">🇧🇩 Bengali</button>
    <button class="lang-chip" onclick="setLanguage('English', this)">🇬🇧 English</button>
    <button class="lang-chip" onclick="setLanguage('Urdu', this)">🌙 Urdu</button>
  </div>

  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-text">📲 <span>Install as App</span> — Home Screen pe add karo!</div>
    <button class="install-btn" onclick="installApp()">Install</button>
    <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">×</button>
  </div>

  <!-- Quote Section -->
  <div class="quote-section">
    <div class="quote-card" id="quoteCard">
      <div class="quote-glow"></div>
      <div class="quote-text" id="quoteText">Loading...</div>
      <div class="quote-meta">
        <span class="quote-category" id="quoteCat"></span>
        <span class="quote-counter" id="quoteCounter"></span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn btn-next" onclick="nextQuote()">▶ Next Quote</button>
      <button class="btn btn-share" onclick="shareQuote()">📤 WhatsApp Share</button>
      <button class="btn btn-fav" id="favBtn" onclick="toggleFav()">❤️ Save Favourite</button>
      <button class="btn btn-copy" onclick="copyQuote()">📋 Copy Quote</button>
    </div>
  </div>
</div>

<!-- Favourites Modal -->
<div class="modal-overlay" id="favsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">❤️ Saved Quotes</div>
      <button class="modal-close" onclick="closeFavs()">×</button>
    </div>
    <div id="favsList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

let currentCat = 'All';
let currentLang = 'All';
let filteredQuotes = [...quotes];
let currentIndex = 0;
let favorites = JSON.parse(localStorage.getItem('quoteFavs') || '[]');
let deferredPrompt;

function getFiltered() {
  return quotes.filter(q => {
    const catOk = currentCat === 'All' || q.cat === currentCat;
    const langOk = currentLang === 'All' || q.lang === currentLang;
    return catOk && langOk;
  });
}

function showQuote() {
  filteredQuotes = getFiltered();
  if (filteredQuotes.length === 0) {
    document.getElementById('quoteText').textContent = 'Koi quote nahi mila!';
    document.getElementById('quoteCat').textContent = '';
    document.getElementById('quoteCounter').textContent = '';
    return;
  }
  if (currentIndex >= filteredQuotes.length) currentIndex = 0;
  const q = filteredQuotes[currentIndex];

  const el = document.getElementById('quoteText');
  el.textContent = q.text;
  el.className = 'quote-text';
  if (q.lang === 'Urdu') el.classList.add('urdu');
  if (q.lang === 'Bengali') el.classList.add('bengali');

  const catEl = document.getElementById('quoteCat');
  catEl.textContent = q.cat;
  catEl.className = 'quote-category cat-' + q.cat.toLowerCase();

  document.getElementById('quoteCounter').textContent = (currentIndex+1) + ' / ' + filteredQuotes.length;

  // Animate card
  const card = document.getElementById('quoteCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn 0.4s ease';

  updateFavBtn();
}

function nextQuote() {
  filteredQuotes = getFiltered();
  currentIndex = (currentIndex + 1) % (filteredQuotes.length || 1);
  showQuote();
}

function setCategory(cat, btn) {
  currentCat = cat;
  currentIndex = 0;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showQuote();
}

function setLanguage(lang, btn) {
  currentLang = lang;
  currentIndex = 0;
  document.querySelectorAll('.lang-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showQuote();
}

function shareQuote() {
  const q = filteredQuotes[currentIndex];
  if (!q) return;
  const text = q.text + '\n\n— Quotes & Status App se';
  if (navigator.share) {
    navigator.share({ text });
  } else {
    const url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }
}

function copyQuote() {
  const q = filteredQuotes[currentIndex];
  if (!q) return;
  navigator.clipboard.writeText(q.text).then(() => showToast('✅ Quote copy ho gaya!')).catch(() => showToast('Copy nahi hua, try again'));
}

function toggleFav() {
  const q = filteredQuotes[currentIndex];
  if (!q) return;
  const idx = favorites.findIndex(f => f.text === q.text);
  if (idx === -1) {
    favorites.push(q);
    showToast('❤️ Favourite mein save ho gaya!');
  } else {
    favorites.splice(idx, 1);
    showToast('💔 Favourite se hataya gaya');
  }
  localStorage.setItem('quoteFavs', JSON.stringify(favorites));
  updateFavBtn();
}

function updateFavBtn() {
  const q = filteredQuotes[currentIndex];
  const btn = document.getElementById('favBtn');
  if (!q) return;
  const saved = favorites.some(f => f.text === q.text);
  btn.textContent = saved ? '❤️ Saved!' : '❤️ Save Favourite';
  btn.className = 'btn btn-fav' + (saved ? ' saved' : '');
}

function openFavs() {
  const list = document.getElementById('favsList');
  if (favorites.length === 0) {
    list.innerHTML = '<div class="no-favs">😕 Abhi koi saved quote nahi hai<br><br>Quotes save karo ❤️ button se!</div>';
  } else {
    list.innerHTML = favorites.map((f,i) => `
      <div class="fav-item">
        <span>${f.text}</span>
        <button class="fav-delete" onclick="deleteFav(${i})">🗑</button>
      </div>
    `).join('');
  }
  document.getElementById('favsModal').classList.add('open');
}

function deleteFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem('quoteFavs', JSON.stringify(favorites));
  openFavs();
  updateFavBtn();
}

function closeFavs() {
  document.getElementById('favsModal').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// PWA Install
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    });
  } else {
    showToast('📲 Browser menu se "Add to Home Screen" karo!');
  }
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
showQuote();
</script>
